<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Birthday Sketchbook</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script>
    // Mobile detection and redirect
    (function() {
      var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
                     window.innerWidth <= 768;
      
      if (isMobile) {
        window.location.href = 'mobile_redirect.html';
      }
    })();
  </script>
  
  <!-- Audio Element -->
  <audio id="backgroundMusic" loop>
    <source src="LaguNadin.mp3" type="audio/mpeg">
    Browser Anda tidak mendukung audio element.
  </audio>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 22%, #e1bee7 48%, #bbdefb 72%, #f48fb1 100%);
      background-size: 320% 320%;
      animation: gradientFlow 22s ease-in-out infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 40%; }
      50% { background-position: 100% 60%; }
      100% { background-position: 0% 40%; }
    }

    /* Full-page floating hearts (behind cards) */
    .floating-hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-heart {
      position: absolute;
      bottom: -8%;
      left: 0;
      user-select: none;
      animation-name: heartRise;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      will-change: transform, opacity;
      filter: drop-shadow(0 0 6px rgba(233, 30, 99, 0.15));
    }

    @keyframes heartRise {
      0% {
        transform: translate3d(0, 0, 0) rotate(-8deg) scale(0.85);
        opacity: 0;
      }
      8% {
        opacity: 1;
      }
      92% {
        opacity: 1;
      }
      100% {
        transform: translate3d(var(--drift, 18px), -115vh, 0) rotate(18deg) scale(1.05);
        opacity: 0;
      }
    }

    .container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(233, 30, 99, 0.2);
      max-width: 500px;
      width: 100%;
      padding: 30px;
      text-align: center;
      animation: float 6s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    .emoji {
      font-size: 60px;
      margin-bottom: 20px;
      animation: bounce 2s ease-in-out infinite, wiggle 3s ease-in-out infinite;
      display: inline-block;
    }
    
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-10px);
      }
      60% {
        transform: translateY(-5px);
      }
    }
    
    @keyframes wiggle {
      0%, 100% {
        transform: rotate(0deg);
      }
      25% {
        transform: rotate(3deg);
      }
      75% {
        transform: rotate(-3deg);
      }
    }

    #content {
      position: relative;
      overflow: hidden;
    }

    /* Halaman kartu: transisi lucu saat Next / Back */
    .page-body {
      animation-duration: 0.72s;
      animation-fill-mode: both;
      animation-timing-function: cubic-bezier(0.28, 0.95, 0.32, 1.12);
    }

    .page-body.page-enter-forward {
      animation-name: pageSpringNext;
    }

    .page-body.page-enter-backward {
      animation-name: pageSpringPrev;
    }

    .page-body.page-enter-initial {
      animation-name: pageSpringFirst;
    }

    @keyframes pageSpringNext {
      0% {
        opacity: 0;
        transform: translateX(44px) translateY(12px) rotate(4deg) scale(0.9);
      }
      58% {
        opacity: 1;
        transform: translateX(-10px) translateY(-6px) rotate(-1.2deg) scale(1.03);
      }
      100% {
        opacity: 1;
        transform: translateX(0) translateY(0) rotate(0deg) scale(1);
      }
    }

    @keyframes pageSpringPrev {
      0% {
        opacity: 0;
        transform: translateX(-44px) translateY(12px) rotate(-4deg) scale(0.9);
      }
      58% {
        opacity: 1;
        transform: translateX(10px) translateY(-6px) rotate(1.2deg) scale(1.03);
      }
      100% {
        opacity: 1;
        transform: translateX(0) translateY(0) rotate(0deg) scale(1);
      }
    }

    @keyframes pageSpringFirst {
      0% {
        opacity: 0;
        transform: scale(0.86) translateY(28px);
      }
      62% {
        opacity: 1;
        transform: scale(1.04) translateY(-8px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes cardFadeRise {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes quoteBloom {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(12px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes imgPeek {
      from {
        opacity: 0;
        transform: scale(0.92) translateY(14px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes emojiCardPeek {
      from {
        opacity: 0;
        transform: scale(0.35) rotate(-12deg);
      }
      70% {
        transform: scale(1.12) rotate(4deg);
      }
      to {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    .page-body.page-enter-forward > .emoji,
    .page-body.page-enter-backward > .emoji,
    .page-body.page-enter-initial > .emoji {
      animation: emojiCardPeek 0.62s cubic-bezier(0.34, 1.45, 0.64, 1) 0.05s both,
        bounce 2s ease-in-out 0.62s infinite,
        wiggle 3s ease-in-out 0.62s infinite;
    }

    .page-body .title {
      animation: cardFadeRise 0.52s cubic-bezier(0.25, 0.85, 0.25, 1) 0.1s backwards;
    }

    .page-body .text {
      animation: cardFadeRise 0.55s cubic-bezier(0.25, 0.85, 0.25, 1) 0.18s backwards;
    }

    .page-body .quote {
      animation: quoteBloom 0.62s cubic-bezier(0.34, 1.35, 0.64, 1) 0.14s backwards;
    }

    .page-body .image-placeholder {
      animation: imgPeek 0.65s cubic-bezier(0.34, 1.25, 0.64, 1) 0.2s backwards;
    }

    .title {
      font-size: 28px;
      color: #c2185b;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .text {
      font-size: 16px;
      color: #6d4c7a;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quote {
      font-style: italic;
      color: #9c27b0;
      font-size: 18px;
      padding: 15px;
      border-left: 3px solid #f48fb1;
      border-right: 3px solid #f48fb1;
      background: rgba(243, 229, 245, 0.3);
      border-radius: 10px;
      margin: 20px 0;
    }

    .image-placeholder {
      background: linear-gradient(135deg, rgba(252, 228, 236, 0.6) 0%, rgba(243, 229, 245, 0.6) 100%);
      border: 2px dashed rgba(244, 143, 177, 0.5);
      border-radius: 15px;
      padding: 40px;
      margin: 20px 0;
      color: #c06090;
      font-size: 14px;
    }

    .image-icon {
      font-size: 40px;
      display: block;
      margin-bottom: 10px;
    }

    .navigation {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(244, 143, 177, 0.3);
    }

    .nav-btn {
      background: #e91e63;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.3s;
    }

    .nav-btn:hover {
      background: #c2185b;
      transform: scale(1.1) rotate(2deg);
      animation: wiggle-btn 0.5s ease-in-out;
    }
    
    @keyframes wiggle-btn {
      0%, 100% {
        transform: scale(1.1) rotate(2deg);
      }
      25% {
        transform: scale(1.1) rotate(-2deg);
      }
      50% {
        transform: scale(1.1) rotate(3deg);
      }
      75% {
        transform: scale(1.1) rotate(-3deg);
      }
    }

    .nav-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .progress {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(244, 143, 177, 0.3);
      transition: all 0.3s;
    }

    .dot.active {
      background: #e91e63;
      transform: scale(1.3);
      animation: dot-bounce 0.6s ease-out;
    }
    
    @keyframes dot-bounce {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.5);
      }
      70% {
        transform: scale(1.2);
      }
      100% {
        transform: scale(1.3);
      }
    }

    .page-info {
      font-size: 12px;
      color: #999;
      margin-bottom: 20px;
    }

    .lock-screen {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.94);
      border-radius: 24px;
      padding: 36px 32px 40px;
      max-width: 360px;
      text-align: center;
      border: 2px solid rgba(244, 143, 177, 0.35);
      box-shadow:
        0 12px 40px rgba(233, 30, 99, 0.12),
        0 0 0 1px rgba(255, 255, 255, 0.8) inset;
      animation: lockCardIn 0.85s cubic-bezier(0.22, 1, 0.36, 1) both,
        lockCardGlow 4s ease-in-out infinite 0.85s;
    }

    @keyframes lockCardIn {
      from {
        opacity: 0;
        transform: translateY(28px) scale(0.94) rotate(-1deg);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
      }
    }

    @keyframes lockCardGlow {
      0%, 100% {
        box-shadow:
          0 12px 40px rgba(233, 30, 99, 0.12),
          0 0 28px rgba(244, 143, 177, 0.2),
          0 0 0 1px rgba(255, 255, 255, 0.8) inset;
      }
      50% {
        box-shadow:
          0 16px 48px rgba(233, 30, 99, 0.18),
          0 0 36px rgba(233, 30, 99, 0.22),
          0 0 0 1px rgba(255, 255, 255, 0.85) inset;
      }
    }

    .lock-shake-wrap {
      display: inline-block;
      position: relative;
      z-index: 1;
    }

    .lock-shake-wrap.shake-error {
      animation: pinShake 0.55s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }

    @keyframes pinShake {
      0%, 100% { transform: translateX(0); }
      18% { transform: translateX(-10px) rotate(-0.5deg); }
      36% { transform: translateX(10px) rotate(0.5deg); }
      54% { transform: translateX(-7px); }
      72% { transform: translateX(7px); }
    }

    .lock-icon-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 18px;
    }

    .lock-orbit {
      position: absolute;
      inset: -18px;
      pointer-events: none;
      animation: orbitSpin 14s linear infinite;
    }

    .lock-orbit span {
      position: absolute;
      font-size: 15px;
      opacity: 0.88;
    }

    .lock-orbit span:nth-child(1) {
      top: -6px;
      left: 50%;
      margin-left: -10px;
      animation: orbitSparkle 2.1s ease-in-out infinite;
    }

    .lock-orbit span:nth-child(2) {
      right: -8px;
      top: 50%;
      margin-top: -9px;
      animation: orbitSparkle 2.3s ease-in-out infinite 0.35s;
    }

    .lock-orbit span:nth-child(3) {
      bottom: -4px;
      left: 22%;
      animation: orbitSparkle 2s ease-in-out infinite 0.65s;
    }

    .lock-orbit span:nth-child(4) {
      left: -10px;
      top: 42%;
      margin-top: -8px;
      animation: orbitSparkle 2.2s ease-in-out infinite 0.95s;
    }

    @keyframes orbitSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes orbitSparkle {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.75; }
      50% { transform: translateY(-5px) scale(1.18); opacity: 1; }
    }

    .lock-icon {
      font-size: 52px;
      line-height: 1;
      display: inline-block;
      animation: lockBounce 2.4s ease-in-out infinite;
      filter: drop-shadow(0 4px 8px rgba(194, 24, 91, 0.2));
    }

    @keyframes lockBounce {
      0%, 100% { transform: translateY(0) rotate(-4deg); }
      50% { transform: translateY(-8px) rotate(4deg); }
    }

    .lock-title {
      font-size: 24px;
      color: #e91e63;
      margin-bottom: 8px;
      animation: titlePop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s both;
    }

    @keyframes titlePop {
      from {
        opacity: 0;
        transform: scale(0.85) translateY(8px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .lock-subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 26px;
      animation: fadeInUp 0.65s ease-out 0.35s both;
    }

    .pin-input {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 22px;
    }

    .pin-digit {
      width: 42px;
      height: 44px;
      border: 2px solid #f48fb1;
      border-radius: 12px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: #ad1457;
      background: rgba(255, 255, 255, 0.9);
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
    }

    .pin-digit.filled {
      border-color: #e91e63;
      background: linear-gradient(180deg, rgba(252, 228, 236, 0.95), rgba(255, 255, 255, 0.98));
      box-shadow: 0 4px 14px rgba(233, 30, 99, 0.18);
      animation: pinPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes pinPop {
      0% { transform: scale(0.88); }
      55% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .num-btn {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(252, 228, 236, 0.85));
      border: 2px solid rgba(244, 143, 177, 0.45);
      border-radius: 14px;
      padding: 14px;
      font-size: 18px;
      font-weight: bold;
      color: #c2185b;
      cursor: pointer;
      transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.2s,
        border-color 0.2s,
        background 0.2s;
      box-shadow: 0 3px 0 rgba(233, 30, 99, 0.12);
    }

    .num-btn:hover {
      background: linear-gradient(180deg, #fff, rgba(248, 187, 217, 0.5));
      transform: scale(1.06) translateY(-2px);
      box-shadow: 0 6px 16px rgba(233, 30, 99, 0.15);
      border-color: rgba(233, 30, 99, 0.35);
    }

    .num-btn:active {
      transform: scale(0.94) translateY(2px);
      box-shadow: 0 1px 0 rgba(233, 30, 99, 0.1);
      animation: btnSquish 0.35s ease;
    }

    @keyframes btnSquish {
      0% { transform: scale(0.94) translateY(2px); }
      40% { transform: scale(1.02) translateY(0); }
      100% { transform: scale(1) translateY(0); }
    }

    .error {
      color: #e91e63;
      font-size: 12px;
      height: 20px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

<div class="floating-hearts-bg" id="floatingHeartsBg" aria-hidden="true"></div>

<!-- Lock Screen -->
<div id="lockShakeWrap" class="lock-shake-wrap">
<div id="lockScreen" class="lock-screen">
  <div class="lock-icon-wrap">
    <div class="lock-orbit" aria-hidden="true">
      <span>💕</span>
      <span>✨</span>
      <span>💖</span>
      <span>🫶</span>
    </div>
    <div class="lock-icon">🔒</div>
  </div>
  <div class="lock-title">For You 🎂</div>
  <div class="lock-subtitle">Masukkan kata sandi untuk membuka</div>
  
  <div class="pin-input" id="pinInput">
    <input type="text" class="pin-digit" readonly>
    <input type="text" class="pin-digit" readonly>
    <input type="text" class="pin-digit" readonly>
    <input type="text" class="pin-digit" readonly>
    <input type="text" class="pin-digit" readonly>
    <input type="text" class="pin-digit" readonly>
  </div>
  
  <div class="numpad">
    <button class="num-btn" onclick="addNumber('1')">1</button>
    <button class="num-btn" onclick="addNumber('2')">2</button>
    <button class="num-btn" onclick="addNumber('3')">3</button>
    <button class="num-btn" onclick="addNumber('4')">4</button>
    <button class="num-btn" onclick="addNumber('5')">5</button>
    <button class="num-btn" onclick="addNumber('6')">6</button>
    <button class="num-btn" onclick="addNumber('7')">7</button>
    <button class="num-btn" onclick="addNumber('8')">8</button>
    <button class="num-btn" onclick="addNumber('9')">9</button>
    <button class="num-btn" onclick="clearPin()">Clear</button>
    <button class="num-btn" onclick="addNumber('0')">0</button>
    <button class="num-btn" onclick="deleteNumber()">⌫</button>
  </div>
  
  <div class="error" id="errorMsg"></div>
</div>
</div>

<!-- Main Content -->
<div id="mainContent" class="container hidden">
  <div class="page-info" id="pageInfo">Cover • 1 / 8</div>
  
  <div id="content">
    <!-- Content will be inserted here -->
  </div>
  
  <div class="navigation">
    <button class="nav-btn" id="prevBtn" onclick="previousPage()" disabled>← Back</button>
    <div class="progress" id="progress">
      <!-- Progress dots will be inserted here -->
    </div>
    <button class="nav-btn" id="nextBtn" onclick="nextPage()">Next →</button>
  </div>
</div>

<script>
  const CORRECT_PIN = '190406';
  let currentPin = '';
  let currentPage = 0;
  /** 1 = next, -1 = back, 0 = pertama / tanpa slide arah */
  let pageNavDirection = 0;

  const pages = [

    {

      text: 'Semoga di hari jadimu ini, kamu dikelilingi kebahagiaan, cinta, dan semua yang kamu inginkan. ASekkkk , selamat 20 bosqqqqq💕',

    }
  ];

  function addNumber(num) {
    if (currentPin.length < 6) {
      currentPin += num;
      updatePinDisplay();
      
      if (currentPin.length === 6) {
        checkPin();
      }
    }
  }

  function deleteNumber() {
    if (currentPin.length > 0) {
      currentPin = currentPin.slice(0, -1);
      updatePinDisplay();
    }
  }

  function clearPin() {
    currentPin = '';
    updatePinDisplay();
    document.getElementById('errorMsg').textContent = '';
  }

  function updatePinDisplay() {
    const inputs = document.querySelectorAll('.pin-digit');
    inputs.forEach((input, index) => {
      const filled = index < currentPin.length;
      input.value = filled ? '●' : '';
      input.classList.toggle('filled', filled);
    });
  }

  function playMusic() {
    const audio = document.getElementById('backgroundMusic');
    audio.volume = 0.5; // Set volume to 50%
    
    // Try to play the music
    const playPromise = audio.play();
    
    if (playPromise !== undefined) {
      playPromise.then(() => {
        console.log('Music started playing');
      }).catch(error => {
        console.log('Auto-play was prevented. User interaction required.');
        // Add a button to start music if auto-play is blocked
        showMusicButton();
      });
    }
  }
  
  function showMusicButton() {
    const musicBtn = document.createElement('button');
    musicBtn.innerHTML = ' Play Music ';
    musicBtn.style.cssText = `
      position: fixed;
      top: 20px;
      right: 20px;
      background: #e91e63;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 14px;
      z-index: 1000;
      transition: all 0.3s;
    `;
    musicBtn.onclick = () => {
      document.getElementById('backgroundMusic').play();
      musicBtn.style.display = 'none';
    };
    document.body.appendChild(musicBtn);
  }

  function checkPin() {
    if (currentPin === CORRECT_PIN) {
      document.getElementById('lockShakeWrap').classList.add('hidden');
      document.getElementById('mainContent').classList.remove('hidden');
      initializeContent();
      playMusic(); // Start playing music after successful login
    } else {
      document.getElementById('errorMsg').textContent = 'Kata sandi salah, coba lagi ';
      const wrap = document.getElementById('lockShakeWrap');
      wrap.classList.remove('shake-error');
      void wrap.offsetWidth;
      wrap.classList.add('shake-error');
      setTimeout(function () {
        wrap.classList.remove('shake-error');
      }, 600);
      setTimeout(() => {
        clearPin();
      }, 2000);
    }
  }

  function initializeContent() {
    createProgressDots();
    renderPage(0);
  }

  function createProgressDots() {
    const progress = document.getElementById('progress');
    progress.innerHTML = '';
    
    for (let i = 0; i < pages.length; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      progress.appendChild(dot);
    }
  }

  function renderPage(pageIndex) {
    const page = pages[pageIndex];
    const content = document.getElementById('content');
    
    let html = `<div class="emoji">${page.emoji}</div>`;
    
    if (page.title) {
      html += `<h2 class="title">${page.title}</h2>`;
    }
    
    if (page.text) {
      html += `<p class="text">${page.text}</p>`;
    }
    
    if (page.quote) {
      html += `<div class="quote">${page.quote}</div>`;
    }
    
    if (page.image) {
      if (pageIndex === 1) {
        html += `
          <div class="image-placeholder">
            <img src="poto1.jpeg" style="width: 100%; height: auto; border-radius: 10px; object-fit: cover;">
          </div>
        `;
      } else if (pageIndex === 3) {
        html += `
          <div class="image-placeholder">
            <img src="poto2.jpeg" style="width: 100%; height: auto; border-radius: 10px; object-fit: cover;">
          </div>
        `;
      } else if (pageIndex === 6) {
        html += `
          <div class="image-placeholder">
            <img src="poto1.jpeg" style="width: 100%; height: auto; border-radius: 10px; object-fit: cover;">
          </div>
        `;
      } else {
        html += `
          <div class="image-placeholder">
            <span class="image-icon"></span>
            UDh sering jalan jarang foto!!!!
          </div>
        `;
      }
    }

    let enterClass = 'page-enter-initial';
    if (pageNavDirection === 1) enterClass = 'page-enter-forward';
    else if (pageNavDirection === -1) enterClass = 'page-enter-backward';
    pageNavDirection = 0;

    content.innerHTML = '<div class="page-body ' + enterClass + '">' + html + '</div>';
    
    // Update page info
    const pageInfo = document.getElementById('pageInfo');
    pageInfo.textContent = `Halaman ${pageIndex + 1} / ${pages.length}`;
    
    // Update progress dots
    const dots = document.querySelectorAll('.dot');
    dots.forEach((dot, index) => {
      dot.classList.toggle('active', index === pageIndex);
    });
    
    // Update navigation buttons
    document.getElementById('prevBtn').disabled = pageIndex === 0;
    document.getElementById('nextBtn').textContent = 
      pageIndex === pages.length - 1 ? 'Lihat Video →' : 'Next →';
  }

  function nextPage() {
    if (currentPage < pages.length - 1) {
      pageNavDirection = 1;
      currentPage++;
      renderPage(currentPage);
    } else {
      // Go to video page
      window.location.href = 'birthday_video.html';
    }
  }

  function previousPage() {
    if (currentPage > 0) {
      pageNavDirection = -1;
      currentPage--;
      renderPage(currentPage);
    }
  }

  function createFloatingHearts() {
    var wrap = document.getElementById('floatingHeartsBg');
    if (!wrap) return;
    var emoji = ['💕', '💖', '💗', '💓', '💘', '💝', '💞', '🫶', '🌸', '✨', '💐', '🎀'];
    var n = 52;
    for (var i = 0; i < n; i++) {
      var el = document.createElement('div');
      el.className = 'bg-heart';
      el.textContent = emoji[Math.floor(Math.random() * emoji.length)];
      el.style.left = Math.random() * 100 + '%';
      el.style.animationDuration = (14 + Math.random() * 16) + 's';
      el.style.animationDelay = -(Math.random() * 25) + 's';
      el.style.fontSize = (13 + Math.random() * 20) + 'px';
      el.style.setProperty('--drift', (-35 + Math.random() * 70) + 'px');
      wrap.appendChild(el);
    }
  }

  // Initialize
  document.addEventListener('DOMContentLoaded', function() {
    createFloatingHearts();
  });
</script>

</body>
</html>
