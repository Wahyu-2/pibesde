<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Birthday Sketchbook</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script>
    // Mobile detection and redirect
    (function() {
      var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
                     window.innerWidth <= 768;
      
      if (isMobile) {
        window.location.href = 'mobile_redirect.html';
      }
    })();
  </script>
  
  <!-- Audio Element -->
  <audio id="backgroundMusic" loop>
    <source src="LaguNadin.mp3" type="audio/mpeg">
    Browser Anda tidak mendukung audio element.
  </audio>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 30%, #e1bee7 60%, #bbdefb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(233, 30, 99, 0.2);
      max-width: 500px;
      width: 100%;
      padding: 30px;
      text-align: center;
      animation: float 6s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    .emoji {
      font-size: 60px;
      margin-bottom: 20px;
      animation: bounce 2s ease-in-out infinite, wiggle 3s ease-in-out infinite;
      display: inline-block;
    }
    
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-10px);
      }
      60% {
        transform: translateY(-5px);
      }
    }
    
    @keyframes wiggle {
      0%, 100% {
        transform: rotate(0deg);
      }
      25% {
        transform: rotate(3deg);
      }
      75% {
        transform: rotate(-3deg);
      }
    }

    .title {
      font-size: 28px;
      color: #c2185b;
      margin-bottom: 15px;
      font-weight: bold;
      animation: fadeInUp 0.8s ease-out;
    }

    .text {
      font-size: 16px;
      color: #6d4c7a;
      line-height: 1.6;
      margin-bottom: 20px;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quote {
      font-style: italic;
      color: #9c27b0;
      font-size: 18px;
      padding: 15px;
      border-left: 3px solid #f48fb1;
      border-right: 3px solid #f48fb1;
      background: rgba(243, 229, 245, 0.3);
      border-radius: 10px;
      margin: 20px 0;
    }

    .image-placeholder {
      background: linear-gradient(135deg, rgba(252, 228, 236, 0.6) 0%, rgba(243, 229, 245, 0.6) 100%);
      border: 2px dashed rgba(244, 143, 177, 0.5);
      border-radius: 15px;
      padding: 40px;
      margin: 20px 0;
      color: #c06090;
      font-size: 14px;
    }

    .image-icon {
      font-size: 40px;
      display: block;
      margin-bottom: 10px;
    }

    .navigation {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(244, 143, 177, 0.3);
    }

    .nav-btn {
      background: #e91e63;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.3s;
    }

    .nav-btn:hover {
      background: #c2185b;
      transform: scale(1.1) rotate(2deg);
      animation: wiggle-btn 0.5s ease-in-out;
    }
    
    @keyframes wiggle-btn {
      0%, 100% {
        transform: scale(1.1) rotate(2deg);
      }
      25% {
        transform: scale(1.1) rotate(-2deg);
      }
      50% {
        transform: scale(1.1) rotate(3deg);
      }
      75% {
        transform: scale(1.1) rotate(-3deg);
      }
    }

    .nav-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .progress {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(244, 143, 177, 0.3);
      transition: all 0.3s;
    }

    .dot.active {
      background: #e91e63;
      transform: scale(1.3);
      animation: dot-bounce 0.6s ease-out;
    }
    
    @keyframes dot-bounce {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.5);
      }
      70% {
        transform: scale(1.2);
      }
      100% {
        transform: scale(1.3);
      }
    }

    .page-info {
      font-size: 12px;
      color: #999;
      margin-bottom: 20px;
    }

    .lock-screen {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 40px;
      max-width: 350px;
      text-align: center;
    }

    .lock-icon {
      font-size: 50px;
      margin-bottom: 20px;
    }

    .lock-title {
      font-size: 24px;
      color: #e91e63;
      margin-bottom: 10px;
    }

    .lock-subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 30px;
    }

    .pin-input {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .pin-digit {
      width: 40px;
      height: 40px;
      border: 2px solid #f48fb1;
      border-radius: 10px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .num-btn {
      background: rgba(252, 228, 236, 0.7);
      border: 1px solid rgba(244, 143, 177, 0.4);
      border-radius: 10px;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      color: #c2185b;
      cursor: pointer;
      transition: all 0.2s;
    }

    .num-btn:hover {
      background: rgba(244, 143, 177, 0.3);
      transform: scale(1.05);
    }

    .error {
      color: #e91e63;
      font-size: 12px;
      height: 20px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

<!-- Lock Screen -->
<div id="lockScreen" class="lock-screen">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">For You 🎂</div>
  <div class="lock-subtitle">Masukkan kata sandi untuk membuka</div>
  
  <div class="pin-input" id="pinInput">
    <input type="text" class="pin-digit" readonly>
    <input type="text" class="pin-digit" readonly>
    <input type="text" class="pin-digit" readonly>
    <input type="text" class="pin-digit" readonly>
    <input type="text" class="pin-digit" readonly>
    <input type="text" class="pin-digit" readonly>
  </div>
  
  <div class="numpad">
    <button class="num-btn" onclick="addNumber('1')">1</button>
    <button class="num-btn" onclick="addNumber('2')">2</button>
    <button class="num-btn" onclick="addNumber('3')">3</button>
    <button class="num-btn" onclick="addNumber('4')">4</button>
    <button class="num-btn" onclick="addNumber('5')">5</button>
    <button class="num-btn" onclick="addNumber('6')">6</button>
    <button class="num-btn" onclick="addNumber('7')">7</button>
    <button class="num-btn" onclick="addNumber('8')">8</button>
    <button class="num-btn" onclick="addNumber('9')">9</button>
    <button class="num-btn" onclick="clearPin()">Clear</button>
    <button class="num-btn" onclick="addNumber('0')">0</button>
    <button class="num-btn" onclick="deleteNumber()">⌫</button>
  </div>
  
  <div class="error" id="errorMsg"></div>
</div>

<!-- Main Content -->
<div id="mainContent" class="container hidden">
  <div class="page-info" id="pageInfo">Cover • 1 / 8</div>
  
  <div id="content">
    <!-- Content will be inserted here -->
  </div>
  
  <div class="navigation">
    <button class="nav-btn" id="prevBtn" onclick="previousPage()" disabled>← Back</button>
    <div class="progress" id="progress">
      <!-- Progress dots will be inserted here -->
    </div>
    <button class="nav-btn" id="nextBtn" onclick="nextPage()">Next →</button>
  </div>
</div>

<script>
  const CORRECT_PIN = '123456';
  let currentPin = '';
  let currentPage = 0;

  const pages = [
    {
      emoji: '🎂',
      title: 'Kata - Kata Ketuaa',
      text: 'Asekkk Ada yang lagi Hbd nihhhhh UHUYYY.',
      quote: null,
      image: false
    },
    {
      emoji: '📸',
      title: 'ASekk',
      text: 'Cieee udh usia 20 aja nih yaaaa , Selamat Ulang Tahun ya boru sitorusssss',
      quote: null,
      image: true
    },
    {
      emoji: '1 Tesalonika 5:16-1',
      title: 'NIhhh ayat buat luuu',
      text: ' "Bersukacitalah senantiasa. Tetaplah berdoa. Mengucap syukurlah dalam segala hal, sebab itulah yang dikehendaki Allah di dalam Kristus Yesus bagi kamu." ',
      quote: null,
      image: false
    },
    {
      emoji: '🌸',
      title: 'Secuil Kata-Kata',
      text: 'Dua puluh tahun , asekkkkk . bisa di bilang ini bukan usia yang main" untuk kamu rak , kejar semua yang ko impikan , jangan terlena dengan yang ada. ingat tujuan awal untuk membahagiakan orang tua mu ',
      quote: null,
      image: true
    },
    {
      emoji: '✨',
      title: null,
      text: null,
      quote: '"ini bukan akhir , tapi ini awal rak"',
      image: false
    },
    {
      emoji: '🫧',
      title: 'Dunia Emng berat rak',
      text: 'Jangan pernah Lupa buat berdoa ya , jangan lupa minta semua sama Tuhan . kalo Manusia emang terbatas , tapi aku yakin Tuhan itu gada batas nya',
      quote: null,
      image: false
    },
    {
      emoji: '🌙',
      title: 'awak tunggu di batam ces',
      text: 'Jujurlyyy awak pengen juga ngasih supres kek ko kemarin , cuman setelah menimbang aku ga punya relasi di sana , dan awak juga takut buat cowo ko cemburu . buat ulang tahunmu ntar aku kasih hadiah nya pas ko di batam ya',
      quote: null,
      image: true
    },
    {
      emoji: '🎁',
      title: 'Happy Birthday! 🎉',
      text: 'Semoga di hari jadimu ini, kamu dikelilingi kebahagiaan, cinta, dan semua yang kamu inginkan. ASekkkk , selamat 20 bosqqqqq💕',
      quote: null,
      image: false
    }
  ];

  function addNumber(num) {
    if (currentPin.length < 6) {
      currentPin += num;
      updatePinDisplay();
      
      if (currentPin.length === 6) {
        checkPin();
      }
    }
  }

  function deleteNumber() {
    if (currentPin.length > 0) {
      currentPin = currentPin.slice(0, -1);
      updatePinDisplay();
    }
  }

  function clearPin() {
    currentPin = '';
    updatePinDisplay();
    document.getElementById('errorMsg').textContent = '';
  }

  function updatePinDisplay() {
    const inputs = document.querySelectorAll('.pin-digit');
    inputs.forEach((input, index) => {
      input.value = index < currentPin.length ? '●' : '';
    });
  }

  function playMusic() {
    const audio = document.getElementById('backgroundMusic');
    audio.volume = 0.5; // Set volume to 50%
    
    // Try to play the music
    const playPromise = audio.play();
    
    if (playPromise !== undefined) {
      playPromise.then(() => {
        console.log('Music started playing');
      }).catch(error => {
        console.log('Auto-play was prevented. User interaction required.');
        // Add a button to start music if auto-play is blocked
        showMusicButton();
      });
    }
  }
  
  function showMusicButton() {
    const musicBtn = document.createElement('button');
    musicBtn.innerHTML = ' Play Music ';
    musicBtn.style.cssText = `
      position: fixed;
      top: 20px;
      right: 20px;
      background: #e91e63;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 14px;
      z-index: 1000;
      transition: all 0.3s;
    `;
    musicBtn.onclick = () => {
      document.getElementById('backgroundMusic').play();
      musicBtn.style.display = 'none';
    };
    document.body.appendChild(musicBtn);
  }

  function checkPin() {
    if (currentPin === CORRECT_PIN) {
      document.getElementById('lockScreen').classList.add('hidden');
      document.getElementById('mainContent').classList.remove('hidden');
      initializeContent();
      playMusic(); // Start playing music after successful login
    } else {
      document.getElementById('errorMsg').textContent = 'Kata sandi salah, coba lagi ';
      setTimeout(() => {
        clearPin();
      }, 2000);
    }
  }

  function initializeContent() {
    createProgressDots();
    renderPage(0);
  }

  function createProgressDots() {
    const progress = document.getElementById('progress');
    progress.innerHTML = '';
    
    for (let i = 0; i < pages.length; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      progress.appendChild(dot);
    }
  }

  function renderPage(pageIndex) {
    const page = pages[pageIndex];
    const content = document.getElementById('content');
    
    let html = `<div class="emoji">${page.emoji}</div>`;
    
    if (page.title) {
      html += `<h2 class="title">${page.title}</h2>`;
    }
    
    if (page.text) {
      html += `<p class="text">${page.text}</p>`;
    }
    
    if (page.quote) {
      html += `<div class="quote">${page.quote}</div>`;
    }
    
    if (page.image) {
      if (pageIndex === 1) {
        html += `
          <div class="image-placeholder">
            <img src="poto1.jpeg" style="width: 100%; height: auto; border-radius: 10px; object-fit: cover;">
          </div>
        `;
      } else if (pageIndex === 3) {
        html += `
          <div class="image-placeholder">
            <img src="poto2.jpeg" style="width: 100%; height: auto; border-radius: 10px; object-fit: cover;">
          </div>
        `;
      } else if (pageIndex === 6) {
        html += `
          <div class="image-placeholder">
            <img src="poto1.jpeg" style="width: 100%; height: auto; border-radius: 10px; object-fit: cover;">
          </div>
        `;
      } else {
        html += `
          <div class="image-placeholder">
            <span class="image-icon"></span>
            UDh sering jalan jarang foto!!!!
          </div>
        `;
      }
    }
    
    content.innerHTML = html;
    
    // Update page info
    const pageInfo = document.getElementById('pageInfo');
    pageInfo.textContent = `Halaman ${pageIndex + 1} / ${pages.length}`;
    
    // Update progress dots
    const dots = document.querySelectorAll('.dot');
    dots.forEach((dot, index) => {
      dot.classList.toggle('active', index === pageIndex);
    });
    
    // Update navigation buttons
    document.getElementById('prevBtn').disabled = pageIndex === 0;
    document.getElementById('nextBtn').textContent = 
      pageIndex === pages.length - 1 ? 'Lihat Video →' : 'Next →';
  }

  function nextPage() {
    if (currentPage < pages.length - 1) {
      currentPage++;
      renderPage(currentPage);
    } else {
      // Go to video page
      window.location.href = 'birthday_video.html';
    }
  }

  function previousPage() {
    if (currentPage > 0) {
      currentPage--;
      renderPage(currentPage);
    }
  }

  // Initialize
  document.addEventListener('DOMContentLoaded', function() {
    // Nothing to do here, waiting for password
  });
</script>

</body>
</html>
