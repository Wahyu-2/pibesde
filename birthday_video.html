<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Birthday Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script>
    // Mobile detection and redirect
    (function() {
      var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
                     window.innerWidth <= 768;
      
      if (isMobile) {
        window.location.href = 'mobile_redirect.html';
      }
    })();
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 30%, #e1bee7 60%, #bbdefb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(233, 30, 99, 0.2);
      max-width: 700px;
      width: 100%;
      padding: 40px;
      text-align: center;
    }

    .title {
      font-size: 28px;
      color: #c2185b;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .subtitle {
      font-size: 16px;
      color: #6d4c7a;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .video-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 aspect ratio */
      background: linear-gradient(135deg, rgba(252, 228, 236, 0.9), rgba(243, 229, 245, 0.9));
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      border: 2px solid rgba(244, 143, 177, 0.3);
    }

    .video-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: opacity 0.3s;
    }

    .video-overlay:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .video-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .ribbon {
      background: linear-gradient(90deg, #f48fb1, #ce93d8);
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(233, 30, 99, 0.3);
    }

    .play-button {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #ffffff, #f48fb1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 25px rgba(233, 30, 99, 0.3);
      margin-bottom: 20px;
      transition: transform 0.3s;
    }

    .play-button:hover {
      transform: scale(1.1);
    }

    .play-icon {
      width: 0;
      height: 0;
      border-left: 20px solid #c2185b;
      border-top: 12px solid transparent;
      border-bottom: 12px solid transparent;
      margin-left: 5px;
    }

    .overlay-text {
      color: #c2185b;
    }

    .overlay-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .overlay-caption {
      font-size: 14px;
      color: #6d4c7a;
    }

    .video-frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 13px;
    }

    .back-button {
      background: #e91e63;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      margin-top: 30px;
      transition: all 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .back-button:hover {
      background: #c2185b;
      transform: scale(1.05);
    }

    .floating-hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    .heart {
      position: absolute;
      font-size: 20px;
      opacity: 0.3;
      animation: floatUp 8s ease-in-out infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.3;
      }
      90% {
        opacity: 0.3;
      }
      100% {
        transform: translateY(-100px) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

<div class="floating-hearts" id="hearts"></div>

<div class="container">
  <h1 class="title">A Little Video Gift 🎥</h1>
  <p class="subtitle">
    Ini hadiah kecil dalam bentuk video dari YouTube. Saat kamu siap, tekan tombol play dan nikmati momennya pelan-pelan.
  </p>
  
  <div class="video-container">
    <div class="video-overlay" id="videoOverlay" onclick="playVideo()">
      <div class="ribbon">For You 🎀</div>
      <div class="play-button">
        <div class="play-icon"></div>
      </div>
      <div class="overlay-text">
        <div class="overlay-title">Play Birthday Video</div>
        <div class="overlay-caption">Klik untuk memulai, suaranya pelan saja ya 💗</div>
      </div>
    </div>
    
    <iframe 
      id="videoFrame"
      class="video-frame"
      src="https://www.youtube.com/embed/lcQxe_SEutw?si=zlY5APpsOKHYd8xW"
      title="Birthday Video"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen>
    </iframe>
  </div>
  
  <a href="index.html" class="back-button">Kembali ke Sketchbook</a>
</div>

<script>
  function createHearts() {
    const heartsContainer = document.getElementById('hearts');
    const heartEmojis = ['🌸', '💕', '✨', '🌷', '💖', '🎀', '🌼', '💗'];
    
    for (let i = 0; i < 15; i++) {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
      heart.style.left = Math.random() * 100 + '%';
      heart.style.animationDelay = Math.random() * 8 + 's';
      heart.style.animationDuration = (6 + Math.random() * 4) + 's';
      heartsContainer.appendChild(heart);
    }
  }

  function playVideo() {
    const overlay = document.getElementById('videoOverlay');
    const frame = document.getElementById('videoFrame');
    
    // Add autoplay parameter to the YouTube URL
    const currentSrc = frame.src;
    const autoplaySrc = currentSrc.includes('?') 
      ? currentSrc + '&autoplay=1' 
      : currentSrc + '?autoplay=1';
    
    frame.src = autoplaySrc;
    overlay.classList.add('hidden');
  }

  // Initialize hearts when page loads
  document.addEventListener('DOMContentLoaded', function() {
    createHearts();
  });
</script>

</body>
</html>
